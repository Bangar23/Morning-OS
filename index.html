<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:#0a0a0a;color:#e8e4d8;font-family:'Iowan Old Style','Palatino Linotype',Palatino,Georgia,serif;-webkit-font-smoothing:antialiased;min-height:100vh}
body{padding:3vh 6vw 14vh 6vw;max-width:1600px;margin:0 auto;line-height:1.5}
.hidden{display:none!important}
#topbar{display:flex;justify-content:space-between;align-items:baseline;font-size:1.4rem;color:#6f7a6f;letter-spacing:.06em;margin-bottom:4vh;font-variant-numeric:tabular-nums;border-bottom:1px solid #1c1c1a;padding-bottom:2vh}
#session-clock{color:#b8a878;font-weight:600}
.label{font-size:1.05rem;text-transform:uppercase;letter-spacing:.4em;color:#b8a878;margin-bottom:1.5vh}

.opening{font-size:1.4rem;color:#7a7568;font-style:italic;margin-bottom:3.5vh;max-width:64ch}

#devotional-body h3{font-size:1.2rem;text-transform:uppercase;letter-spacing:.28em;color:#b8a878;font-weight:500;margin:4vh 0 1.5vh 0}
#devotional-body p{font-size:1.7rem;line-height:1.55;color:#e8e4d8;margin-bottom:1.5vh}
.verse{font-size:1.55rem;color:#c8c2b0;font-style:italic;border-left:3px solid #3a3a36;padding:.5vh 0 .5vh 1.5vw;margin:2vh 0;max-width:60ch}
.reflect-short{font-size:1.95rem;line-height:1.55;color:#e8e4d8;max-width:56ch}
.begin-btn{background:#1a1a18;color:#e8e4d8;border:1px solid #3a3a36;padding:1.8vh 3vw;font-size:1.4rem;font-family:inherit;letter-spacing:.12em;cursor:pointer;border-radius:4px;margin-top:3vh}
.begin-btn:hover,.begin-btn:focus{background:#2a2a26;border-color:#b8a878;outline:none}
.section-rule{border:none;border-top:1px solid #1c1c1a;margin:6vh 0 5vh 0}
#mobility-section{margin-bottom:7vh}
#mobility-list{list-style:none}
.mob-row{display:flex;align-items:center;justify-content:space-between;padding:2.2vh 0;border-bottom:1px solid #1c1c1a;gap:2vw}
.mob-row:last-child{border-bottom:none}
.mob-left{flex:1}
.mob-name{font-size:2rem;color:#e8e4d8;margin-bottom:.3vh}
.mob-dose{font-size:1.3rem;color:#8a8475;font-style:italic}
.mob-row.done .mob-name{color:#6f7a6f;text-decoration:line-through}
.mob-btn,.set-btn{background:#1a1a18;color:#e8e4d8;border:1px solid #3a3a36;padding:1.2vh 2vw;font-size:1.2rem;font-family:inherit;letter-spacing:.1em;cursor:pointer;border-radius:4px;min-width:9vw}
.mob-btn:hover,.mob-btn:focus,.set-btn:hover,.set-btn:focus{border-color:#b8a878;outline:none}
.mob-btn.done,.set-btn.complete{background:#1f2a1f;color:#6fa06f;border-color:#2a3a2a}
#workout-section{margin-bottom:6vh}
#workout-title{font-size:3.8rem;font-weight:400;margin-bottom:4vh;letter-spacing:-.01em}
.ex-card{border-top:1px solid #1c1c1a;padding:3vh 0 2.5vh 0}
.ex-card:last-child{border-bottom:1px solid #1c1c1a}
.ex-name{font-size:2.4rem;margin-bottom:.8vh;line-height:1.15}
.ex-meta{font-size:1.3rem;color:#8a8475;margin-bottom:1.5vh;font-variant-numeric:tabular-nums}
.ex-meta .sep{color:#3a3a36;margin:0 .6em}
.ex-weight-row{display:flex;align-items:center;gap:1.2vw;margin:1.5vh 0;flex-wrap:wrap}
.last-weight{font-size:1.3rem;color:#8a8475}
.last-weight strong{color:#b8a878;font-weight:500}
.weight-input{background:#151513;border:1px solid #3a3a36;color:#e8e4d8;padding:1vh 1.2vw;font-size:1.6rem;font-family:inherit;border-radius:4px;width:9rem;font-variant-numeric:tabular-nums}
.weight-input:focus{border-color:#b8a878;outline:none}
.mic-btn{background:#1a1a18;color:#e8e4d8;border:1px solid #3a3a36;width:3.4rem;height:3.4rem;font-size:1.4rem;cursor:pointer;border-radius:50%;font-family:inherit}
.mic-btn:hover,.mic-btn:focus{border-color:#b8a878;outline:none}
.mic-btn.listening{background:#3a1f1f;border-color:#c87878}
.set-dots{display:flex;gap:.6vw;margin:1.5vh 0}
.set-dot{width:1.8rem;height:1.8rem;border-radius:50%;background:#1a1a18;border:2px solid #3a3a36}
.set-dot.done{background:#2a4a2a;border-color:#6fa06f}
.set-dot.current{border-color:#b8a878}
.set-btn{padding:1.4vh 2.5vw;font-size:1.3rem;margin-top:1vh}
.ex-cues{margin-top:1.5vh;max-width:60ch}
.ex-cue{font-size:1.25rem;color:#8a8475;line-height:1.5;margin-bottom:.5vh}
.ex-cue .cue-lbl{color:#b8a878;font-variant:small-caps;letter-spacing:.1em;margin-right:.4em}
.ex-card.done{opacity:.55}
#timer-overlay{position:fixed;inset:0;background:rgba(10,10,10,.97);z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:4vh}
#timer-name{font-size:1.8rem;color:#b8a878;letter-spacing:.1em;margin-bottom:3vh;text-align:center;max-width:70ch}
#timer-display{font-size:14rem;color:#e8e4d8;font-weight:300;font-variant-numeric:tabular-nums;line-height:1;letter-spacing:-.02em;margin-bottom:4vh}
#timer-display.warn{color:#d8b878}
#timer-display.go{color:#d87878}
#timer-display.done{color:#6fa06f}
#timer-buttons{display:flex;gap:1.5vw}
#timer-buttons button{background:#1a1a18;color:#e8e4d8;border:1px solid #3a3a36;padding:1.6vh 3vw;font-size:1.3rem;font-family:inherit;letter-spacing:.12em;cursor:pointer;border-radius:4px}
#timer-buttons button:hover,#timer-buttons button:focus{border-color:#b8a878;outline:none}
#wisdom-section{font-size:1.2rem;color:#6f7a6f;margin-top:6vh;letter-spacing:.06em;text-align:center}
#wisdom-section strong{color:#b8a878;font-weight:400}
.step{display:none}.step.active{display:block}
.back-btn{background:transparent;color:#6f7a6f;border:none;padding:1vh 0;font-size:1.1rem;font-family:inherit;cursor:pointer;letter-spacing:.08em;margin-bottom:3vh}
.back-btn:hover,.back-btn:focus{color:#b8a878;outline:none}
.proverb-ref{font-size:1.5rem;color:#b8a878;margin-bottom:1.2vh;font-style:italic}
.proverb-text{font-size:1.7rem;color:#c8c2b0;line-height:1.55;font-style:italic;max-width:64ch}
@media(max-width:1100px){#reading-ref{font-size:3.4rem}#devotional-body p{font-size:1.3rem}#devotional-body h3{font-size:1rem}.opening{font-size:1.15rem}.reflect-short{font-size:1.35rem}#workout-title{font-size:2.4rem}.ex-name{font-size:1.6rem}.mob-name{font-size:1.4rem}#timer-display{font-size:8rem}#topbar{font-size:1rem}}
</style>
</head>
<body>
<header id="topbar"><div id="date">—</div><div id="session-clock" class="hidden">00:00</div><div id="clock">—</div></header>
<section id="devotional-section" class="step active">
  <div class="label">Scripture &middot; ESV Study Bible</div>
  <h1 id="reading-ref">—</h1>
  <p id="reading-opening" class="opening">—</p>
  <div id="devotional-body"></div>
  <div id="wisdom-block">
    <div class="label" style="margin-top:6vh">Wisdom for today</div>
    <div id="proverb-ref" class="proverb-ref">—</div>
    <div id="proverb-text" class="proverb-text">—</div>
  </div>
  <button id="begin-btn" class="begin-btn" onclick="beginSession()">Begin session →</button>
</section>
<section id="mobility-section" class="step">
  <button class="back-btn" onclick="goToStep('devotional')">← devotional</button>
  <div class="label">Mobility reset</div>
  <ol id="mobility-list"></ol>
  <button class="begin-btn" onclick="goToStep('workout')">Start workout →</button>
</section>
<section id="workout-section" class="step">
  <button class="back-btn" onclick="goToStep('mobility')">← mobility</button>
  <div class="label">Today's workout</div>
  <h2 id="workout-title">—</h2>
  <div id="workout-list"></div>
</section>
<div id="timer-overlay" class="hidden">
  <div id="timer-name">—</div>
  <div id="timer-display">0:00</div>
  <div id="timer-buttons">
    <button id="timer-toggle" onclick="toggleTimer()">Start</button>
    <button onclick="closeTimer(true)">Done ✓</button>
    <button onclick="closeTimer(false)">Close</button>
  </div>
</div>

function todayISO(){return new Date().toISOString().split('T')[0];}
function todayLocal(){var d=new Date();d.setHours(0,0,0,0);return d;}
function fmtDate(d){return d.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});}
function fmtClock(d){var h=d.getHours(),m=d.getMinutes(),am=h<12,hh=((h+11)%12)+1;return hh+':'+(m<10?'0':'')+m+(am?'a':'p');}
function fmtMS(s){var m=Math.floor(s/60),x=s%60;return m+':'+(x<10?'0':'')+x;}

var READINGS=[
  {ref:"Romans 1",
   open:"Paul, a servant of Christ Jesus, called to be an apostle, set apart for the gospel of God.",
   verse:"“Claiming to be wise, they became fools.” (Romans 1:22)",
   sections:[
     {h:"What's happening in Romans 1",
      body:"Paul opens his most theologically dense letter with a setup, not a target. He's building toward the argument that every person — moral, intellectual, religious, strategic — needs grace. So he starts wide: humanity suppresses what it knows about God and trades worship of the Creator for worship of created things. Then he traces what happens downstream when that trade is made. The chapter can feel harsh in places, but Paul is not pointing at “them out there.” He's leveling the playing field so that by Romans 3 nobody is left standing on their own."},
     {h:"Important theme",
      body:"Disorder begins with worship disorder. The chapter says it three times in different words — they exchanged the truth for a lie, the glory of the immortal God for images of created things, the natural for the unnatural. The point is structural: what you orient your life around shapes everything downstream of it. Get the center wrong and the edges go crooked. Get the center right and the edges have something to align to."},
     {h:"Why this matters for you",
      body:"You are actively building. Systems. Identity. Discipline. Autonomy. Financial structures. Physical capability. A future leadership position. None of those are bad — they are mostly good. The danger Romans 1 names for an INTJ-9 builder is not recklessness or moral collapse. It is that any of those good things can quietly slide into the center of your life and become the thing you actually trust. Competence becomes self-salvation. Strategy becomes pride. Autonomy becomes isolation. Mastery becomes identity. The system you're building is meant to serve a center; it cannot be the center. If you let it become the center, it will not warn you — it will just slowly hollow you out while you still look like you're winning."},
     {h:"Important balance",
      body:"Don't read this chapter as ammunition. A lot of modern “masculine” content turns Romans 1 into “we are the righteous few in a degenerate culture.” That misses Paul's larger move entirely — Romans 2 immediately turns and says, and you who judge are also guilty. This chapter is not for sorting humanity into the awake and the asleep. It is for dismantling the very instinct in you that wants to do that sorting. Especially the analytical instinct. INTJs build the sharpest categories; Paul takes the categories away."},
     {h:"Most relevant verse for you",
      body:"Your temptation is not recklessness. Your temptation is believing intelligence, competence, and control can ultimately secure your life. Romans 1 destabilizes that idea — in a healthy way, before grace shows up in chapter 3 to give you something better to rest on."}
   ]},
  {ref:"Romans 2",
   open:"God's kindness is meant to lead you to repentance.",
   verse:"“Or do you presume on the riches of his kindness and forbearance and patience, not knowing that God's kindness is meant to lead you to repentance?” (Romans 2:4)",
   sections:[
     {h:"What's happening in Romans 2",
      body:"Right after the harsh-sounding catalog of chapter 1, Paul wheels. He turns to the religious, the moral, the disciplined — the people who would have nodded along through chapter 1 — and puts them under the same indictment: in passing judgment on another you condemn yourself, because you, the judge, practice the very same things. Then he reframes God's posture entirely. Not pressure. Not threat. Kindness, meant to lead to repentance. The chapter develops two ideas in parallel: God's judgment is impartial, and the real insider — the real one of God's people — is the one whose heart is changed inwardly, not whose outward markers are correct."},
     {h:"Important theme",
      body:"Outward markers do not equal inward reality, and kindness is the actual mechanism God uses to move you. We tend to imagine God as either pressuring us or evaluating us. Paul says no — God's kindness is what changes people. That's not soft theology; it's structural. The same God who judges impartially is patient on purpose. He is not weighing whether you've performed; he is drawing you back to him by being kinder than your performance deserves."},
     {h:"Why this matters for you",
      body:"Two things land hard for an INTJ-9 builder. First: you build systems, and you can measure your own life by the outward markers — discipline, workouts shipped, scripture read, hours worked, the optics of doing it right. Romans 2 isn't asking you to stop doing those things. It is asking you to notice when the markers have replaced the relationship. The disciplined Pharisee was not condemned for being disciplined. He was condemned for thinking the discipline was the point. Second: the 9 in you expects God to be quietly disappointed. The INTJ in you expects God to operate on logic and merit. Paul's actual claim is that the way God moves you is kinder than either of those expectations. Re-set your morning around that. You are not being pressured into this day. You are being met inside it."},
     {h:"Important balance",
      body:"Don't twist kindness into permission. Paul is not saying God doesn't really care what you do. Read verses 6 through 10 carefully — there is real consequence in this chapter. Kindness is the mechanism of change, not the absence of standard. It is the path, not the destination. The error in one direction is religious anxiety; the error in the other is moral drift. Romans is going to spend sixteen chapters threading that needle. Today, just notice the first stitch: he is kinder than you expect, and that kindness is meant to move you, not relax you."},
     {h:"Most relevant verse for you",
      body:"This verse undoes two of your default postures at once. It tells the 9 in you to stop hiding from a God you imagine is mildly annoyed at you. And it tells the strategist in you that kindness is not weakness — it is the actual mechanism by which transformation happens. The path forward today is not to clean yourself up before approaching him. It is to let his kindness reach you, and to be moved by it."}
   ]},
  {ref:"Romans 3",open:"All have sinned and fall short of the glory of God.",reflect:"You quietly believe you're above the average problem. You aren't. That's the door, not the wall — mercy only works on equal ground."},
  {ref:"Romans 4",open:"Abraham believed God, and it was counted to him as righteousness.",reflect:"Faith is staking before the evidence is in. Where today are you holding out for proof you're not going to get?"},
  {ref:"Romans 5",open:"Therefore, since we have been justified by faith, we have peace with God.",reflect:"Peace with God is not a feeling to chase. It's a position to stand on. Lead from the position, not the mood."},
  {ref:"Romans 6",open:"How can we who died to sin still live in it?",reflect:"The pattern you keep half-obeying is not your master anymore. Name one. Then don't repeat it."},
  {ref:"Romans 7",open:"I do not understand my own actions.",reflect:"Paul names the mess and stays in love with God anyway. You're not a failed Christian for feeling the tension."},
  {ref:"Romans 8",open:"There is therefore now no condemnation for those who are in Christ Jesus.",reflect:"Read this addressed by name. None — not for the tired part, not for the part that wonders if you're enough."},
  {ref:"Romans 9",open:"I have great sorrow and unceasing anguish in my heart.",reflect:"Let love cost you something today. Carry someone's weight without managing it."},
  {ref:"Romans 10",open:"How are they to hear without someone preaching?",reflect:"Your life with your wife and son is a sermon being preached without words. What does the daily texture say?"},
  {ref:"Romans 11",open:"Oh, the depth of the riches and wisdom and knowledge of God!",reflect:"Your frame of God is good but not God. Stay teachable."},
  {ref:"Romans 12",open:"Present your bodies as a living sacrifice.",reflect:"Worship is bodily, ordinary, daily. Nothing gets to be too small."},
  {ref:"Romans 13",open:"Owe no one anything, except to love each other.",reflect:"You're good at paying owed money. This is about owed presence."},
  {ref:"Romans 14",open:"Each one should be fully convinced in his own mind.",reflect:"Hold yours firmly and others charitably — especially with your wife."},
  {ref:"Romans 15",open:"We who are strong have an obligation to bear with the failings of the weak.",reflect:"Strength is for carrying, not for comparing. Today it goes underneath someone, not above them."},
  {ref:"Romans 16",open:"I commend to you our sister Phoebe.",reflect:"He ends the most theological letter naming people. Look up from the system and see who's in the room with you."},
  {ref:"Ecclesiastes 1",open:"Vanity of vanities, says the Preacher; all is vanity.",reflect:"What today are you treating as ultimate that's actually a passing breath?"},
  {ref:"Ecclesiastes 2",open:"I made great works.",reflect:"Achievement doesn't satisfy the soul it was supposed to fill. The build is fine; don't ask it to be a savior."},
  {ref:"Ecclesiastes 3",open:"For everything there is a season.",reflect:"This season has its own particular work. Don't grieve it for not being a different one."},
  {ref:"Ecclesiastes 4",open:"Two are better than one.",reflect:"Where today are you choosing alone when together is the actual move?"},
  {ref:"Ecclesiastes 5",open:"Guard your steps when you go to the house of God.",reflect:"Quick to listen, slow to speak — same at the dinner table as at the altar."},
  {ref:"Ecclesiastes 6",open:"All the toil of man is for his mouth, yet his appetite is not satisfied.",reflect:"Name what you're actually hungry for. It's rarely productivity. Usually presence."},
  {ref:"Ecclesiastes 7",open:"A good name is better than precious ointment.",reflect:"Reputation is compounding interest on small honest choices."},
  {ref:"Ecclesiastes 8",open:"Who is like the wise? Who knows the interpretation of a thing?",reflect:"Sometimes sitting with the open is the wiser thing. You don't have to resolve everything today."},
  {ref:"Ecclesiastes 9",open:"Whatever your hand finds to do, do it with your might.",reflect:"Today's work, done fully, is enough. You aren't behind on a race that isn't being run."},
  {ref:"Ecclesiastes 10",open:"Dead flies make the perfumer's ointment give off a stench.",reflect:"Clean up a small habit before it stains a bigger one."},
  {ref:"Ecclesiastes 11",open:"Cast your bread upon the waters, for you will find it after many days.",reflect:"Sow without watching every seed. Some work won't show up for years."},
  {ref:"Ecclesiastes 12",open:"Remember your Creator in the days of your youth.",reflect:"Before the body slows. Before the circle thins. Build now."}
];

function completeSet(i){
  var w=WORKOUTS[new Date().getDay()],ex=w.exs[i],st=S.exState[i];
  var ni=st.sets.indexOf(false);if(ni===-1)return;
  st.sets[ni]=true;
  if(st.weight&&ni===0)DB.logWeight(ex.name,st.weight,todayISO());
  var ad=st.sets.every(function(x){return x;});
  if(ad||!ex.rest)renderWorkout(new Date().getDay());
  else startTimer(ex.rest,'Rest — '+ex.name+' — set '+(ni+2)+' of '+st.sets.length,function(){renderWorkout(new Date().getDay());});
}
function startExerciseTimer(i){
  var w=WORKOUTS[new Date().getDay()],ex=w.exs[i],st=S.exState[i];

  S.sessionIv=setInterval(updateSessionClock,1000);updateSessionClock();
  goToStep('mobility');
}
function updateSessionClock(){
  if(!S.sessionStart)return;
  var s=Math.floor((Date.now()-S.sessionStart)/1000),h=Math.floor(s/3600),m=Math.floor((s%3600)/60),x=s%60;
  document.getElementById('session-clock').textContent=(h?h+':'+(m<10?'0':''):'')+m+':'+(x<10?'0':'')+x;
}
function startTimer(s,n,cb){
  S.timer.remainingSecs=s;S.timer.onDone=cb||function(){};S.timer.name=n;S.timer.running=true;
  clearInterval(S.timer.iv);
  document.getElementById('timer-overlay').classList.remove('hidden');
  document.getElementById('timer-name').textContent=n;
  document.getElementById('timer-toggle').textContent='Pause';
  updateTimerDisplay();S.timer.iv=setInterval(tickTimer,1000);
}
function tickTimer(){
  if(!S.timer.running)return;
  S.timer.remainingSecs--;updateTimerDisplay();
  if(S.timer.remainingSecs<=0){
    clearInterval(S.timer.iv);S.timer.running=false;
    var d=document.getElementById('timer-display');d.textContent='Done';d.className='done';
    try{beep();}catch(e){}
    setTimeout(function(){closeTimer(true);},1500);
  }
}
function updateTimerDisplay(){
  var d=document.getElementById('timer-display');
  d.textContent=fmtMS(Math.max(0,S.timer.remainingSecs));d.className='';
  if(S.timer.remainingSecs<=5)d.className='go';
  else if(S.timer.remainingSecs<=15)d.className='warn';
}
function toggleTimer(){
  S.timer.running=!S.timer.running;
  document.getElementById('timer-toggle').textContent=S.timer.running?'Pause':'Resume';
  if(S.timer.running){clearInterval(S.timer.iv);S.timer.iv=setInterval(tickTimer,1000);}
  else clearInterval(S.timer.iv);
}
function closeTimer(c){
  clearInterval(S.timer.iv);S.timer.running=false;
  document.getElementById('timer-overlay').classList.add('hidden');
  if(c&&typeof S.timer.onDone==='function'){var cb=S.timer.onDone;S.timer.onDone=null;cb();}
}
function beep(){var c=new (window.AudioContext||window.webkitAudioContext)(),o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.frequency.value=880;g.gain.value=.12;o.start();setTimeout(function(){o.stop();c.close();},350);}
function voiceWeight(i){
  var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  var btn=document.getElementById('mic-'+i);
  if(!SR){alert('Voice input not supported in this browser. Type the weight instead.');return;}
  var r=new SR();r.lang='en-US';r.continuous=false;r.interimResults=false;
  btn.classList.add('listening');
  r.onresult=function(e){var t=e.results[0][0].transcript,m=t.match(/[\d.]+/);if(m){S.exState[i].weight=m[0];renderWorkout(new Date().getDay());}};
  r.onerror=function(){btn.classList.remove('listening');};
  r.onend=function(){btn.classList.remove('listening');};
  try{r.start();}catch(e){btn.classList.remove('listening');}
}
function tickClock(){document.getElementById('clock').textContent=fmtClock(new Date());}
function scheduleNext4AM(){var n=new Date(),x=new Date(n);x.setHours(4,0,0,0);if(x<=n)x.setDate(x.getDate()+1);setTimeout(function(){location.reload();},x-n);}
function goToStep(name){
  ['devotional','mobility','workout'].forEach(function(s){
    var el=document.getElementById(s+'-section');
    if(!el)return;
    if(s===name)el.classList.add('active');else el.classList.remove('active');
  });
  try{window.scrollTo(0,0);}catch(e){}
  try{history.replaceState(null,'','#'+name);}catch(e){}
}

render();
setInterval(tickClock,30*1000);
scheduleNext4AM();
</script>
</body>
</html>
