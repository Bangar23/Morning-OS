     {h:"Why this matters for Hannah",
      body:"You don't pick your season — you steward it. You are in a specific season right now. New motherhood. Wife to a husband building toward a future neither of you can fully see yet. A practice still small. Body changed. Sleep fragmented. Identity rearranged in ways no one warned you about. Every season has its own work, and this season's work is not the work of five years ago or five years from now. The 4 in you will be tempted to grieve this season for what it isn't — the solitude you used to have, the version of yourself you can no longer be, the friendships that don't fit the new shape. The grief is real and you don't have to suppress it. But this season also has its own beauty no other season can give. The Preacher says: act faithfully inside the season you've been put in. The eternity in your heart is real — the ache for more than this is built in — but it is not a sign you are doing this season wrong. It is a sign you were made for an eternity this season can only point toward."},
     {h:"Important balance",
      body:"This is not fatalism. The chapter does not say “you have no agency, just accept whatever comes.” It says God has structured time, and you are to act faithfully within the season he has put you in. Plant when it's time to plant. Pluck up when it's time to pluck up. The agency is real; it is also bounded. You are a steward of time, not its author."},
     {h:"Most relevant verse for you",
      body:"Eternity in your heart. That is why no season ever feels like quite enough. That is why even the good days have an edge of ache. You were built for more than the sun. Don't read that ache as a sign you are doing the present season wrong. Read it as evidence that you were made for something the present season can only point toward. Honor the season; ache for the eternity. Both at once."}
   ]},
  {ref:"Ecclesiastes 4",
   open:"Again I saw all the oppressions that are done under the sun. Two are better than one.",
   verse:"“Though a man might prevail against one who is alone, two will withstand him — a threefold cord is not quickly broken.” (Ecclesiastes 4:12)",
   sections:[
     {h:"What's happening in Ecclesiastes 4",
      body:"The Preacher surveys two evils. First, oppression — the tears of the oppressed with no one to comfort them. Second, isolated toil — the man with no son and no brother who works endlessly without ever stopping to ask “for whom am I toiling and depriving myself of pleasure?” Then he pivots into the famous companionship passage: two are better than one. If they fall, one will lift up his fellow. If two lie together, they keep warm. A threefold cord is not quickly broken. The chapter ends with a sober note about how popularity is also vapor — the young king who replaces the old will himself be forgotten."},
     {h:"Important theme",
      body:"Isolated competence is not the goal. The Preacher praises companionship not sentimentally, but structurally. The cord of three strands is not stronger because it feels nicer; it is stronger because it has more redundancy when one strand fails. The Christian life and the human life are built to be lived in tethered company, not in heroic solitude. Self-sufficiency is one of vapor's most flattering disguises."},
     {h:"Why this matters for you",
      body:"INTJ-9s drift toward self-contained competence. You can do most things yourself, you prefer to do most things yourself, and most of the time it works. Ecclesiastes 4 names the cost of that pattern. The man toiling alone, the man without a brother, the man whose isolation looks like strength — the Preacher pities him. Your wife is the first strand. Your daughter becomes the second. The third strand is harder for you to maintain — the few friends or brothers in Christ who actually know your life and can lift you up when you fall. Audit the third strand. Where is your isolated competence quietly becoming a liability? Pick one specific place this week to choose “together” over “alone.”"},
     {h:"Why this matters for Hannah",
      body:"Two are better than one. For the INFJ in you, this isn't usually the trap of relying too much on visible competence — it is the trap of relying too much on interior solitude. The introvert in you needs alone time to function, and that's healthy. The 4 in you can quietly convert healthy solitude into something more isolating — a self-sufficiency of the inner life, where you process everything alone because no one quite gets it the way you do. Ecclesiastes 4 names the cost of that drift. Your husband is the first strand. Your daughter will become the second. The third strand — the few real friendships with women who actually know your life — is the one hardest for you to maintain, because it requires sharing the interior you're used to keeping mostly to yourself. Audit the third strand. Which woman, specifically, do you need to let further in? Pick one and send her something honest this week."},
     {h:"Important balance",
      body:"This is not a call to constant social activity. The Preacher is not advocating for shallow networking or for never being alone. He is naming a structural truth: humans were built for tethered company, not for autonomous heroism. Some of your work will be solitary, and that's fine. The question is whether your soul, beneath the daily activity, is alone in a way it doesn't have to be."},
     {h:"Most relevant verse for you",
      body:"Threefold cord. The image is precise — not two strands, three. Most people get the spouse strand. Many add the children strand. The third strand — peer brotherhood that actually knows you — is the one that decays first under the pressure of a building life. The firm, the family, the discipline all conspire to crowd it out. Don't let it. Today, send one text to the man whose name came to mind reading this. Don't make it a project. Just keep the strand alive."}
   ]},
  {ref:"Ecclesiastes 5",
   open:"Guard your steps when you go to the house of God. To draw near to listen is better than to offer the sacrifice of fools.",
   verse:"“Let your words be few. For a dream comes with much business, and a fool's voice with many words.” (Ecclesiastes 5:2b–3)",
   sections:[
     {h:"What's happening in Ecclesiastes 5",
      body:"Three movements. First, on worship and vows — go to the house of God to listen, not to perform. Don't make rash promises to God; better not to vow than to vow and not pay. Second, on the futility of accumulation — the lover of money is not satisfied with money, the increase of wealth increases the people who consume it, and the rich man can't sleep. Third, a quiet hinge: it is good to enjoy what God has given, to eat and drink and take pleasure in your toil, because the days are not long and God keeps the heart occupied with joy."},
     {h:"Important theme",
      body:"Restraint in speech is reverence. The Preacher pairs the worship section with the wealth section deliberately — both are domains where humans tend to think more talk equals more piety, or more money equals more security. He says the opposite. Few words. Drawn near to listen. Modest expectations of what stuff can do for you. Quiet enjoyment of what God gives. That is what reverence looks like in practice."},
     {h:"Why this matters for you",
      body:"You don't have a problem with too many words — INTJs rarely do. But you do have an internal version of the problem: the constant mental noise that runs over every situation, narrating, analyzing, planning, judging. The Preacher's call to “let your words be few” is also a call to let your interior chatter be few. When you draw near to God in the morning, the move is not to bring God a polished outline of your thoughts. The move is to listen. Sit. Let the static drop. As for the wealth section — your future firm is real, and money is going to come up. Read verses 10–17 carefully now, while the wealth is still hypothetical. The man who loves money never has enough. Decide now what enough looks like, before the actual numbers start to argue with you."},
     {h:"Why this matters for Hannah",
      body:"Restraint in speech is reverence. For you, the chapter's call to draw near to listen lands a particular way. Your prayer life is rich in feeling, image, and interior dialogue — that's part of how an INFJ relates to God. The shadow is that the interior dialogue can crowd out the listening. You bring God so much processed material there isn't much silence left for him to speak into. Try the opposite move tomorrow morning. Let the words be few. Sit. Don't perform interior depth for him. Just listen. As for the wealth section — verses 18–20 are for you: it is good to enjoy what God has given. The 4 in you can find it hard to enjoy what is, because the interior ideal keeps making the actual look smaller than it is. Receive what's in front of you as gift. God keeps the heart occupied with joy when the heart is willing to receive what is actually being given."},
     {h:"Important balance",
      body:"Don't twist “few words” into a piety of silence that avoids God. The Preacher is not saying don't pray. He is saying don't pray as a fool — as if the volume of your speech impresses heaven. Speak honestly, briefly, and with the awareness that you are addressing the one who already knows. As for wealth — Ecclesiastes is not anti-prosperity. It is anti-trust in prosperity. Earn well, give well, enjoy well, don't worship."},
     {h:"Most relevant verse for you",
      body:"The Preacher's parallel — much business produces a dream, many words produce a fool — is aimed at a culture that confuses activity with substance. Be the man whose words are few and weighty. At the dinner table with your wife. In the prayer before the meal. In the texts you send during the day. In the way you teach your daughter when she is old enough to listen. Quality of speech, not quantity. The presence in your silence will say more than your sentences."}
   ]},
  {ref:"Ecclesiastes 6",
   open:"All the toil of man is for his mouth, yet his appetite is not satisfied.",
   verse:"“The more words, the more vanity, and what is the advantage to man? For who knows what is good for man while he lives the few days of his vain life, which he passes like a shadow?” (Ecclesiastes 6:11–12a)",
   sections:[
     {h:"What's happening in Ecclesiastes 6",
      body:"A short, dark chapter. The Preacher describes a man to whom God gives wealth, possessions, and honor, but does not give him the power to enjoy them. A stranger consumes them instead. Better, he says, is a stillborn child than such a man — a sobering line. The chapter wrestles with the gap between having and enjoying, between toil and satisfaction. He ends with a series of rhetorical questions: who knows what is good for man? Who can tell him what will be after him under the sun? The chapter sits as a kind of valley before the wisdom of chapter 7."},
     {h:"Important theme",
      body:"Having and enjoying are not the same thing. The Preacher's most haunting observation in this chapter is that God can give a man all the conditions for satisfaction and still withhold the capacity to enjoy them. That observation is uncomfortable, but it's true. You have known people with everything who could not be present to it. The capacity to enjoy is itself a gift, and it is not automatically distributed with the possessions. Pray for the capacity, not just the conditions."},
     {h:"Why this matters for you",
      body:"This is the chapter that will press on you most as the firm comes into being. The man in verses 1–2 is the warning case — he had it all, and could not taste it. The conditions you are building toward (resources, position, freedom) do not guarantee the capacity to enjoy them. The capacity is built now, in small acts of presence to a wife and a daughter and a meal and a quiet morning. If you don't develop the capacity now, when the conditions arrive, you will not know what to do with them. You will have a future firm and an emptier soul. Name what you are actually hungry for. It is rarely productivity or status. Usually presence. Usually peace. Usually being known and loved. Feed the actual hunger, not its substitutes."},
     {h:"Why this matters for Hannah",
      body:"Having and enjoying are not the same thing. This is the central INFJ-4 ache stated theologically. You can have a beautiful home, a loving husband, a healthy daughter, and meaningful work — and still find yourself looking at it from a slight distance, unable to fully taste it. The Preacher saw this in himself. He had everything and could not enjoy it. The capacity to enjoy is itself a gift, separate from the conditions that should produce it, and it is built slowly through small acts of presence to what is actually in front of you. The 4 in you defaults to the imagined version of the moment, the one with the better lighting and the deeper feeling. The actual moment, by comparison, can feel thin. Practice receiving the actual. The breakfast as it actually was. The conversation as it actually went. The daughter as she actually is right now. The husband as he actually is, not the one you sometimes imagine. The capacity to taste comes from receiving the real, not waiting for the ideal."},
     {h:"Important balance",
      body:"Don't read this chapter as “success is a curse.” The Preacher is not against having; he is against the illusion that having and enjoying are the same. The cure is not less; it is right relation to what you have. Receive everything from God's hand and you will be able to taste it. Receive it as something you owned or earned, and the taste will keep slipping away."},
     {h:"Most relevant verse for you",
      body:"The few days of his vain life, which he passes like a shadow. That sentence is meant to land. Your life is short. The shadow image is not a metaphor for despair — it is a metaphor for proportion. A shadow has a clear shape, and it is also brief. Don't live as if you have unlimited runway. Don't live as if the runway is what you're for. You have a small, beautiful, finite span. Spend it on what actually feeds you, not on what only looks like food."}
   ]},
  {ref:"Ecclesiastes 7",
   open:"A good name is better than precious ointment, and the day of death than the day of birth.",
   verse:"“It is better to go to the house of mourning than to go to the house of feasting, for this is the end of all mankind, and the living will lay it to heart.” (Ecclesiastes 7:2)",
   sections:[
     {h:"What's happening in Ecclesiastes 7",
      body:"A series of “better than” proverbs that invert common sense. A good name is better than fragrance, death better than birth, mourning better than feasting, sorrow better than laughter, the rebuke of the wise better than the song of fools. The Preacher then turns to wisdom itself — its value, its limits, and the warning against extremes (don't be overly righteous, don't be overly wicked). He observes that no one is fully righteous, no one is fully wise, and the search for the deep order of things is exhausting. The chapter ends with the observation that God made man upright, but they have sought out many schemes."},
     {h:"Important theme",
      body:"Sober reflection produces a better life than constant celebration. The Preacher's “better than” line — that the house of mourning is better than the house of feasting — is not morbid. It is structural. Funerals make you wise; parties don't. The thing that forces you to face mortality and meaning is more formative than the thing that helps you forget. The wise person does not avoid the heavy places; he chooses them, because they shape him."},
     {h:"Why this matters for you",
      body:"You are a new father. You have already had the small forms of the house of mourning — the late nights, the helplessness, the strange new awareness that your life is now permanently tied to another life smaller than yours. The 9 in you wants to smooth those moments into manageable feelings. The Preacher says no — sit in them. They are shaping you. The man who avoids the heavy moments stays shallow; the man who lays them to heart becomes wise. As for the “good name” — your reputation is being built right now, in private, with people who can do nothing for you. It is the compounding interest on a thousand small honest choices. The firm you will build later will rest on the name you are quietly making now."},
     {h:"Why this matters for Hannah",
      body:"Sober reflection produces a better life than constant celebration. The 4 in you is already drawn to the house of mourning — you don't need to be talked into taking the heavy seriously. If anything, you carry the heavy with more weight than most. The chapter isn't asking you to feel things more; it is asking you to let what you already feel deposit something rather than just pass through. There is a difference between sitting with weight and circling in it. The 4 default is to circle — to revisit the moment, the slight, the loss, examining each angle, never quite extracting the lesson. The Preacher's phrase is precise: the living will lay it to heart. Lay it. Let it land. Take what it is teaching you and stop turning it over. The good name you are quietly building, in the slow texture of small honest choices, is exactly the soil your soul already attends to."},
     {h:"Important balance",
      body:"Don't read this as a call to morbidity or constant heaviness. The Preacher will later say to eat your bread with joy. Both are true. Sit in the heavy places when they come; receive the light places when they come. Don't manufacture either. Just don't avoid the heavy ones, because they are doing work in you that the light ones cannot."},
     {h:"Most relevant verse for you",
      body:"The living will lay it to heart. The point of attending the heavy moments is not the moments themselves; it is what they leave behind in you. Don't process funerals — your own or others' — by moving quickly past them. Don't process the slow erosions in your marriage by powering through. Don't process the disappointments in your career by reframing them. Lay them to heart. Let them deposit something. Wisdom is the long sediment of moments laid to heart, not skipped."}
   ]},
  {ref:"Ecclesiastes 8",
   open:"Who is like the wise? And who knows the interpretation of a thing?",
   verse:"“When I applied my heart to know wisdom… then I saw all the work of God, that man cannot find out the work that is done under the sun. However much man may toil in seeking, he will not find it out.” (Ecclesiastes 8:16–17)",
   sections:[
     {h:"What's happening in Ecclesiastes 8",
      body:"The Preacher meditates on wisdom, authority, and the limits of understanding. He acknowledges that the wise face has a softening effect, that obedience to authority is wise, that no one has authority over the day of his death. He wrestles with the apparent injustice of the world — the wicked who prosper and the righteous who suffer — and gives a small, hard-earned counsel: enjoy your bread and wine, do the work of your hands, and trust God for what is hidden. The chapter ends with the admission that even the wisest man cannot fully trace what God is doing."},
     {h:"Important theme",
      body:"Wisdom includes admitting what wisdom cannot do. The Preacher is one of the wisest figures in the Bible, and his honest report is that he cannot find out the work of God. That admission is not a failure of wisdom; it is the highest expression of it. The fool thinks he has it figured out. The wise man knows where the limit is and reverences what lies beyond it."},
     {h:"Why this matters for you",
      body:"INTJs hate unresolved variables. You want closure on questions of meaning, justice, providence, the future, your calling. Ecclesiastes 8 says some questions will not close in this life. The wicked sometimes do prosper. The righteous sometimes do suffer. Your model will not fully account for it. That is not because your model is bad; it is because the data set is bigger than you can see. The mature response is not to force the closure or to abandon the analysis — it is to do today's work faithfully and to trust the rest. Sit with the open. The wisest thing you can do today may be to stop trying to resolve something you were never going to resolve, and to enjoy your bread and wine while you do the work of your hands."},
     {h:"Why this matters for Hannah",
      body:"Wisdom includes admitting what wisdom cannot do. For the INFJ in you, this lands differently than for a strategist. You don't need the model to close; you intuit your way through ambiguity comfortably. What you can't tolerate is the felt sense of unresolution — the relational ache that won't be fixed, the chapter of your life that won't tie off cleanly, the wrong done to someone you love that won't be made right in this life. The Preacher names this directly. The wicked sometimes prosper. The righteous sometimes suffer. The work of God cannot be fully traced under the sun. Your felt model cannot close, because the data is bigger than what you can see. The mature response is not to force the resolution, or to drift into bitterness when it doesn't come; it is to do today's work faithfully and to trust the One who sees the parts you can't. Some of the things you carry are not yours to resolve. They are his."},
     {h:"Important balance",
      body:"Don't use “mystery” as a dodge from real questions. The Preacher is not anti-inquiry; he just spent eight chapters inquiring. He is anti-arrogance — the assumption that human reasoning can close everything. Inquire diligently. Honor the limit when you find it. Don't pretend the limit is closer than it is; don't pretend it isn't there."},
     {h:"Most relevant verse for you",
      body:"However much man may toil in seeking. Notice the toil-word. The Preacher does not say there's no use trying. He says the toil is real, and the closure is partial. That is the honest report from the most relentless seeker in the canon. Take comfort: your own unresolved questions are not a sign you haven't worked hard enough. They are evidence you are doing the actual work."}
   ]},
  {ref:"Ecclesiastes 9",
   open:"Whatever your hand finds to do, do it with your might.",
   verse:"“Enjoy life with the wife whom you love, all the days of your vain life that he has given you under the sun. For this is your portion in life and in your toil at which you toil under the sun.” (Ecclesiastes 9:9)",
   sections:[
     {h:"What's happening in Ecclesiastes 9",
      body:"The Preacher reflects on the one fate that comes to all — death levels everything. The same event happens to the wise and the foolish, the clean and the unclean. The dead know nothing; their love and their hate and their envy have already perished. Then he pivots into one of the warmest passages in the book: go, eat your bread with joy, drink your wine with a merry heart, let your garments always be white, enjoy life with the wife you love, do whatever your hand finds to do with all your might. The chapter ends with the observation that time and chance happen to all, that the race is not always to the swift, and that a poor wise man's wisdom can save a city — even if no one remembers him."},
     {h:"Important theme",
      body:"In the face of death, joy is not a distraction — it is the right response. The Preacher's argument is not nihilistic. Because life is brief, eat with joy. Because the future is uncertain, work with full strength. Because chance happens, do not delay love. The mortality of life is not a reason to withdraw from it but a reason to enter it more fully, with your wife, with your work, with your bread and your wine."},
     {h:"Why this matters for you",
      body:"Read verse 9 again. Enjoy life with the wife whom you love. The Preacher singles out the spouse specifically — not the career, not the legacy, not the wisdom, not the wealth. The wife. The Hebrew word ḥayyîm — life — appears twice in that one verse, framing the relationship as the location where life is actually lived. The 9 in you can drift into a low-grade, parallel existence next to your wife — present in the room but not actually with her. The strategist in you can put the marriage on the “stable, doesn't need attention” line of the dashboard while you build other things. Ecclesiastes 9 says no. The relationship is where your portion is. Don't bank on later. Enjoy her now. As for the work line — do what you find to do with your might. Today's work, fully done, is enough. You aren't behind on a race that isn't being run."},
     {h:"Why this matters for Hannah",
      body:"This verse is for your husband — and it has a quieter mirror for you. The Preacher singles out the marriage as the place where life is actually lived. Read it from your side: you are called to enjoy life with the husband whom you love, all the days of your vain life. The 4 in you can drift into a romantic disappointment that no actual marriage can fully avoid — a felt sense that something deeper should be happening between you than is currently happening, that he should see you more fully than he does, that the connection should feel more like the one you imagined. Some of that is the real work of marriage to grow into. Some of it is the 4 ache that no human relationship can satisfy. The Preacher's counsel is to enjoy the marriage you actually have, not the marriage you imagined. The husband in front of you, with his actual gifts and actual limits, is your portion. Receive him as gift. Tell him today, specifically, one thing you love about who he actually is — not who he could become."},
     {h:"Important balance",
      body:"Don't read “whatever your hand finds, do with your might” as a permission slip for workaholism. The Preacher puts it directly between “enjoy life with your wife” and “time and chance happen to all.” The full-strength work is bounded by the relationship and by the recognition that you don't control the outcome. Work fully. Don't worship the work. The full-strength is for the doing, not for the controlling."},
     {h:"Most relevant verse for you",
      body:"The Preacher's most personal verse for the new-father version of you. Enjoy life with the wife. All the days. The vain (hevel) days. The breath-quick days you currently feel slipping fast. He says this twice in the same verse — your life and your toil are both vapor, and exactly because of that, the marriage is the portion. Today, find one moment, however small, to be specifically present with her — not as the father of your daughter, not as the man building the future, but as her husband, looking at her, paying attention to her. The portion is in that moment."}
   ]},
  {ref:"Ecclesiastes 10",
   open:"Dead flies make the perfumer's ointment give off a stench; so a little folly outweighs wisdom and honor.",
   verse:"“If the iron is blunt, and one does not sharpen the edge, he must use more strength, but wisdom helps one to succeed.” (Ecclesiastes 10:10)",
   sections:[
     {h:"What's happening in Ecclesiastes 10",
      body:"A loose collection of proverbs on wisdom and folly — the difference small things make, the importance of competent leadership, the value of sharpening the tool, the cost of laziness, the corrosive effect of careless words. The dead-fly image is the chapter's framing: small impurities can ruin a large container of valuable oil. A small amount of folly can undo a lot of wisdom. The chapter is the most Proverbs-like section of Ecclesiastes — practical, concrete, attentive to the small."},
     {h:"Important theme",
      body:"Small things compound, in both directions. The Preacher's eye in this chapter is on the small lever — the dead fly, the blunt edge, the slip of the lip — that disproportionately affects the larger system. Wisdom is not just the big choices; it is the daily care of the small ones. The man who keeps the small things clean tends to find the large things stay clean. The man who lets the small things rot tends to find the large things rot eventually too."},
     {h:"Why this matters for you",
      body:"Your build is a long compound. The firm, the marriage, the fatherhood, the body, the soul — none of them are built by single decisive moves. They are built by a thousand small daily choices that compound, for years, in the direction of either order or decay. Ecclesiastes 10 is the chapter for the man building long. Identify a small habit right now that is currently a “dead fly” — a thing that is presently small and contained but that you know, if left alone, will stain something larger over time. Don't moralize it. Just clean it up. Then sharpen the blunt edge — the daily practice you've been muscling through that could be done with less effort and more wisdom if you actually sharpened it. Tools first, then strength. Wisdom helps one succeed."},
     {h:"Why this matters for Hannah",
      body:"Small things compound, in both directions. The 4 in you tends to think in terms of large symbolic moves — the meaningful conversation that finally happens, the big shift in identity, the deep season of transformation. Ecclesiastes 10 is the chapter for the small lever. The patterns that shape your life are not the big symbolic moments; they are the small daily choices that compound over years. Identify one small dead-fly habit today — a thing that is presently small and contained but that you know, left alone, will stain something larger. Don't moralize it. Just clean it up. And sharpen the blunt edge — the daily practice you've been muscling through that could be done with less effort if you actually sharpened the tool. For you, the blunt edge is often relational — the way you ask a question, the way you ask for help, the way you tell your husband what you actually need before the gap turns into resentment. Sharpen there. The strength you save will become available for the work that actually needs your strength."},
     {h:"Important balance",
      body:"Don't turn this chapter into perfectionism. The Preacher is not saying every small flaw will ruin you. He is saying small flaws have outsized effects and should be addressed before they grow. Address them with sober attention, not with anxiety. You are not maintaining purity by white-knuckle effort; you are stewarding a long compound with regular small corrections."},
     {h:"Most relevant verse for you",
      body:"Sharpen the iron. INTJs love this verse, because it is the exact insight you live by — work smarter, build the system, refine the tool. The Preacher's twist is to apply it to wisdom itself. The blunt edge in your life right now is probably not your physical training or your work routine; you've already sharpened those. The blunt edge is probably in the relational or spiritual domain — the way you pray, the way you listen, the way you handle the small frictions at home. Sharpen there. The strength you save on the blunt-edge work will become the strength available for everything else."}
   ]},
  {ref:"Ecclesiastes 11",
   open:"Cast your bread upon the waters, for you will find it after many days.",
   verse:"“In the morning sow your seed, and at evening withhold not your hand, for you do not know which will prosper, this or that, or whether both alike will be good.” (Ecclesiastes 11:6)",
   sections:[
     {h:"What's happening in Ecclesiastes 11",
      body:"The Preacher moves toward closing the book by counseling action despite uncertainty. Cast bread on the waters — diversify your work, give generously, do good with no guaranteed return. Don't wait for perfect conditions; if you watch the wind you will never sow, and if you watch the clouds you will never reap. Sow in the morning and at evening, because you don't know which will prosper. The chapter then turns to the young — rejoice in your youth, walk in the ways of your heart, but know that God will bring you into judgment. Remove vexation from your heart; the dawn of life and the morning of life are both vapor."},
     {h:"Important theme",
      body:"Diversified faithful action under uncertainty. The Preacher does not say wait until you know. He says act without knowing, because the knowing is not coming, and the waiting is the trap. Sow widely. Give generously. Don't optimize so tightly that you only do the things with proven returns. Some of what you sow will not bear visible fruit for years; some you will not live to see. Sow anyway."},
     {h:"Why this matters for you",
      body:"This is the chapter for the strategist about to start a firm. You will be tempted to wait until the conditions are perfect — the right capital, the right market, the right team, the right risk profile. The Preacher's counsel cuts directly against that instinct. He who watches the wind will never sow. There is no condition under which the analysis fully closes. Sow in the morning. Sow in the evening. Diversify the bets. Give while you build. Some of the seed will bear fruit you didn't predict; some won't bear fruit at all. The result is not yours to control — only the sowing is. As for your daughter — much of what you sow into her now will not show up for twenty years. You will not get the visible return on the boring morning routines, the quiet bedtime prayers, the patient repetition of small truths. Sow anyway. Some seed is for harvests you will not personally see."},
     {h:"Why this matters for Hannah",
      body:"Sow widely, faithfully, under uncertainty. The 4 in you can be vulnerable to a particular kind of paralysis — not waiting for analysis to close, but waiting to feel ready, to feel inspired, to feel that the conditions are aligned with your interior sense of what this work should be. The Preacher says no. He who watches the wind will never sow. Cast your bread on the waters even when the felt conditions aren't there. Show up to the work that doesn't currently feel meaningful, send the email when you'd rather process your feelings about it first, do the small acts of mothering that don't feel emotionally significant in the moment. Some of what you sow will bear fruit decades from now — in your daughter, in your marriage, in the slow integrity of your clinical work. The morning seed and the evening seed both go in. You don't get to know which will prosper. Sow anyway."},
     {h:"Important balance",
      body:"Sowing widely is not the same as sowing carelessly. The Preacher is not commending recklessness — he is commending action under uncertainty. Use wisdom in what you sow. Just don't let the search for certainty become the excuse for never sowing at all. The error in one direction is reckless plunging; the error in the other is paralysis. Walk the middle."},
     {h:"Most relevant verse for you",
      body:"Morning and evening. Two times a day, not one. The Preacher's small grace note is that the day has more than one window for sowing. The morning routine you are building is good. Add the evening seed — the closing of the day, the bedtime presence with your daughter, the small intentional act with your wife, the final five minutes of scripture or prayer. Two sowings a day, for years, will compound into something the analysis cannot currently predict."}
   ]},
  {ref:"Ecclesiastes 12",
   open:"Remember also your Creator in the days of your youth, before the evil days come.",
   verse:"“The end of the matter; all has been heard. Fear God and keep his commandments, for this is the whole duty of man.” (Ecclesiastes 12:13)",
   sections:[
     {h:"What's happening in Ecclesiastes 12",
      body:"The Preacher's closing. He addresses the young directly: remember your Creator now, before the evil days come — and then he paints one of the most beautiful and sober images of aging in all of literature, all of it in metaphor. The keepers of the house tremble (hands). The strong men are bent (legs). The grinders cease (teeth). Those who look through the windows are dimmed (eyes). The doors on the street are shut (hearing fades). The almond tree blossoms (white hair). The grasshopper drags itself along (mobility goes). Man goes to his eternal home, the silver cord is snapped, the golden bowl is broken. Then the Preacher steps back: vanity of vanities — and gives the final word. Fear God and keep his commandments. This is the whole duty of man. For God will bring every deed into judgment."},
     {h:"Important theme",
      body:"The conclusion of wisdom is not a system; it is a posture. Twelve chapters of brutal honesty about life under the sun arrive at a two-line conclusion: fear God, keep his commandments. Not because the other questions don't matter — they do — but because the answer to the question of how to live well in a hevel world is finally a relational orientation, not a strategy. Fear and obey the One who frames the whole thing."},
     {h:"Why this matters for you",
      body:"Read the aging passage slowly. You are young. The keepers of the house are not yet trembling. The strong men are still upright. The grinders work. The grasshopper still leaps. The Preacher is not being morbid; he is being honest. The body that lifts now will not lift then. The clarity you have now will fade. The window is open now, and it will not stay open. Remember your Creator now. Build the foundation now, in the days of strength, that will hold when the strength goes. The firm you build, the marriage you tend, the daughter you father, the body you train, the discipline you keep — all of it is being constructed inside a window that will close. That is not a tragedy. It is the structure inside which faithful life is possible at all. The final word of the wisest book in the canon, addressed to you, is: fear God. Keep his commandments. This is the whole duty. Not part. Not most. The whole."},
     {h:"Why this matters for Hannah",
      body:"Remember your Creator now, in the days of your youth. The aging passage is meant to be read slowly. You are young. The keepers of the house are not yet trembling. The grinders work. The window is open now, and it will not stay open. The 4 in you tends to live with one eye on the meaning of your life as a whole — what story is being told, whether it amounts to anything. Ecclesiastes 12 cuts past that. The final word of the wisest book in the canon, addressed to you, is two sentences. Fear God. Keep his commandments. Not “live a meaningful story.” Not “become the truest version of yourself.” Fear God. Keep his commandments. This is the whole duty. The depth you long for is on the other side of that simplicity, not in elaborate searching for it. The 4's deepest fear — that you will reach the end and discover you missed the thing you were actually for — is answered directly here. The thing you were for is in front of you, and it is simpler than you suspected. Fear God in the next thing. Keep his commandments in the next thing. The whole life is a long chain of next things done in fear and obedience. That is enough."},
     {h:"Important balance",
      body:"Don't read this as “only the final two verses matter and the other twelve chapters were a long throat-clearing.” The Preacher's path to fear-God-and-keep-his-commandments goes through twelve chapters of relentless honesty about life under the sun, and that path matters. The conclusion is not “ignore the hard stuff and just obey.” The conclusion is “having seen the hard stuff clearly, this is the only durable response.” Easy obedience that has not been tested against the vapor is shallow. Obedience that has been forged through honesty about the vapor is the real thing. Be the latter."},
     {h:"Most relevant verse for you",
      body:"The end of the matter; all has been heard. The Preacher closes the case. After twelve chapters of inquiry, he says the verdict is in, and the verdict is simple — though not easy. Fear God. Keep his commandments. The strategist's instinct is to elaborate, to refine, to build a more complete theory. The Preacher's last word is to stop, and to do the one thing that is given to you to do. Today, lower the bar from “figure it all out” to “fear God and obey him in the next thing.” That is the whole duty. It is enough."}
   ]}
];

function tickTimer(){
  if(!S.timer.running)return;

  if(S.timer.intervals){
    var iv=S.timer.intervals,el=S.timer.totalDur-S.timer.remainingSecs;
    var cd=0;for(var i=0;i<iv.pattern.length;i++)cd+=iv.pattern[i].dur;
    var inC=el%cd,cum=0,phI=0;
    for(var i=0;i<iv.pattern.length;i++){if(inC<cum+iv.pattern[i].dur){phI=i;break;}cum+=iv.pattern[i].dur;}
    var rdI=Math.floor(el/cd);
    var key=rdI+'-'+phI;
    if(S.timer.lastPhaseKey&&S.timer.lastPhaseKey!==key){
      try{tone(iv.pattern[phI].phase==='HARD'?880:440,250);}catch(e){}
    }

  updateTimerDisplay();
  if(S.timer.remainingSecs<=0){

function updateTimerDisplay(){

    var cd=0;for(var i=0;i<iv.pattern.length;i++)cd+=iv.pattern[i].dur;
    var inC=el%cd,cum=0,phI=0,phEl=0;
    for(var i=0;i<iv.pattern.length;i++){if(inC<cum+iv.pattern[i].dur){phI=i;phEl=inC-cum;break;}cum+=iv.pattern[i].dur;}
    var ph=iv.pattern[phI],phRem=ph.dur-phEl,rdI=Math.floor(el/cd);

    phEl_d.classList.remove('hidden');
    var rd=document.getElementById('timer-round');
    rd.textContent='Round '+(rdI+1)+' of '+iv.rounds;rd.classList.remove('hidden');

  clearInterval(S.timer.iv);S.timer.running=false;
  document.getElementById('timer-overlay').classList.add('hidden');
  if(c&&typeof S.timer.onComplete==='function'){var cb=S.timer.onComplete;S.timer.onComplete=null;cb();}
}
function beep(){var c=new (window.AudioContext||window.webkitAudioContext)(),o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.frequency.value=880;g.gain.value=.12;o.start();setTimeout(function(){o.stop();c.close();},350);}
function tone(freq,ms){var c=new (window.AudioContext||window.webkitAudioContext)(),o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.frequency.value=freq;g.gain.value=.14;o.start();setTimeout(function(){o.stop();c.close();},ms||250);}
function voiceWeight(i){
  var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  var btn=document.getElementById('mic-'+i);
  if(!SR){alert('Voice input not supported in this browser. Type the weight instead.');return;}
  var r=new SR();r.lang='en-US';r.continuous=false;r.interimResults=false;
  btn.classList.add('listening');
  r.onresult=function(e){var t=e.results[0][0].transcript,m=t.match(/[\d.]+/);if(m){S.exState[i].weight=m[0];renderWorkout(new Date().getDay());}};
  r.onerror=function(){btn.classList.remove('listening');};
  r.onend=function(){btn.classList.remove('listening');};
  try{r.start();}catch(e){btn.classList.remove('listening');}
}
function tickClock(){document.getElementById('clock').textContent=fmtClock(new Date());}
function scheduleNext4AM(){var n=new Date(),x=new Date(n);x.setHours(4,0,0,0);if(x<=n)x.setDate(x.getDate()+1);setTimeout(function(){location.reload();},x-n);}
function goToStep(name){
  ['devotional','mobility','workout'].forEach(function(s){
    var el=document.getElementById(s+'-section');
    if(!el)return;
    if(s===name)el.classList.add('active');else el.classList.remove('active');
  });
  try{window.scrollTo(0,0);}catch(e){}
  try{history.replaceState(null,'','#'+name);}catch(e){}
}

render();
setInterval(tickClock,30*1000);
scheduleNext4AM();
</script>
</body>
</html>
